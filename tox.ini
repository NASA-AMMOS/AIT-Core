[tox]
envlist =
    py39
    py310
    py311
    py312
    docs
    lint

isolated_build = True

[gh-actions]
python =
    3.9: py39
    3.10: py310
    3.11: py311
    3.12: py312, docs, lint, distcheck

[testenv]
setenv = AIT_CONFIG = {toxinidir}/config/config.yaml
whitelist_externals = poetry
commands_pre =
    poetry install
commands =
    poetry run pytest tests/

[testenv:docs]
setenv = AIT_CONFIG = {toxinidir}/config/config.yaml
whitelist_externals = poetry
commands_pre =
    poetry install
commands =
    poetry run sphinx-build doc/source doc/build
basepython = python3.12

[testenv:lint]
setenv = AIT_CONFIG = {toxinidir}/config/config.yaml
commands_pre =
    poetry install
commands=
    python -m pre_commit run --color=always {posargs:--all}
basepython = python3.12

[testenv:distcheck]
skip_install = true
deps =
    twine
    poetry
commands =
    poetry build
    poetry run twine check dist/*
