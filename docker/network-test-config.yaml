default:

    cmddict:
        filename:  ../config/cmd.yaml

    tlmdict:
        filename:  ../config/tlm.yaml

    server:

        inbound-streams:

            - stream:
                name: input_stream_debug_1
                input:
                    - "TCP"
                    - "0.0.0.0"
                    - 1234
                handlers:
                    - name: ait.core.server.handlers.DebugHandler
                      handler_name: "TCP Server"


            - stream:
                name: input_stream_debug_2
                input:
                    - "UDP"
                    - "0.0.0.0"
                    - 1235
                handlers:
                    - name: ait.core.server.handlers.DebugHandler
                      handler_name: "UDP Server"

            - stream:
                name: input_stream_debug_3
                input:
                    - "TCP"
                    - "tcp-server-send"
                    - 1238
                handlers:
                    - name: ait.core.server.handlers.DebugHandler
                      handler_name: "TCP Client"

        outbound-streams:
            - stream:
                input:
                    - input_stream_debug_1
                name: output_stream_debug_1
                output:
                    - "TCP"
                    - "tcp-server"
                    - 1237

            - stream:
                name: output_stream_debug_2
                input:
                    - input_stream_debug_2
                output:
                    - "UDP"
                    - "udp-server"
                    - 1236
